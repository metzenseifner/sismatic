name: Publish to PyPI

# Reusable module of the Build & Release pipeline — not a standalone workflow.
# The pipeline calls it (uses: ./.github/workflows/publish-pypi.yml) as a final
# job on v* tags, after checks + the wheel/sdist builds have passed. It carries
# no build logic: it just gathers the distributions from the same run and ships
# them.
#
# Auth is PyPI Trusted Publishing (OIDC), so there is no API token to manage:
# configure sismatic's trusted publisher on PyPI to point at this repo, this
# workflow file (publish-pypi.yml), and the `pypi` environment below.

on:
  workflow_call:

jobs:
  publish:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/sismatic/
    permissions:
      # Required for Trusted Publishing (OIDC token exchange with PyPI).
      id-token: write
    steps:
      # Wheels + sdist were uploaded earlier in this same run, so no run-id is
      # needed — download-artifact pulls them straight from the current run.
      - name: Download pipeline artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Gather only the Python distributions. The pipeline also uploads a crate
      # tarball (sismatic-crate-*.tar.gz), which is not a PyPI artifact.
      - name: Collect wheels + sdist
        run: |
          mkdir -p dist
          find artifacts \( -name '*.whl' -o -name '*.tar.gz' \) \
            -not -name '*crate*' -exec cp -n {} dist/ \;
          echo "Files to publish:"
          ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
